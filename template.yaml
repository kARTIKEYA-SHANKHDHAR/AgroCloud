AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AgroCloud Backend Deployment — 100% AWS Pure Stack (Lambda, DynamoDB, Cognito).

Globals:
  Function:
    Timeout: 30
    MemorySize: 2048

Resources:
  # ── COGNITO USER POOL (Pure AWS Auth) ─────────────────────
  AgroUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: AgroCloudUsers
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  AgroUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AgroCloudWebClient
      UserPoolId: !Ref AgroUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  # ── MAIN LAMBDA FUNCTION ────────────────────────────────────
  AgroCloudApi:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - arm64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PredictionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FarmsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SensorDataTable
      Environment:
        Variables:
          PREDICTIONS_TABLE: !Ref PredictionsTable
          FARMS_TABLE: !Ref FarmsTable
          SENSOR_DATA_TABLE: !Ref SensorDataTable
          COGNITO_USER_POOL_ID: !Ref AgroUserPool
          COGNITO_CLIENT_ID: !Ref AgroUserPoolClient
      Events:
        ProxyApiRoot:
          Type: Api
          Properties:
            Path: /
            Method: any
        ProxyApiGreedy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: any
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./backend
      DockerTag: latest

  # ── DYNAMODB TABLES ─────────────────────────────────────────
  PredictionsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: id
        Type: String

  FarmsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: user_id
        Type: String

  SensorDataTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: thing_id
        Type: String

  # ── IOT INTEGRATION ──────────────────────────────────────────
  IoTDynamoDBRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTDynamoDBPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt SensorDataTable.Arn

  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: AgroCloudSensorDataRule
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM 'agrocloud/sensors/#'"
        Actions:
          - DynamoDB:
              TableName: !Ref SensorDataTable
              RoleArn: !GetAtt IoTDynamoDBRole.Arn
              HashKeyField: "thing_id"
              HashKeyValue: "${thing_id}"

Outputs:
  AgroCloudApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  CognitoUserPoolId:
    Description: "ID of the User Pool"
    Value: !Ref AgroUserPool
  CognitoClientId:
    Description: "ID of the User Pool Client"
    Value: !Ref AgroUserPoolClient
